<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问卷管理 - 大学生职业规划调查</title>
<style>
:root {
  --primary: #1a56db;
  --primary-light: #eef2ff;
  --primary-hover: #1648c0;
  --text: #1e293b;
  --text-secondary: #64748b;
  --bg: #f8fafc;
  --card: #ffffff;
  --border: #e2e8f0;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding-bottom:40px}
.container{max-width:960px;margin:0 auto;padding:16px}
.header{background:linear-gradient(135deg,var(--primary),#3b82f6);color:#fff;padding:24px 20px;border-radius:0 0 var(--radius) var(--radius);margin:-16px -16px 24px;text-align:center}
.header h1{font-size:1.3rem;font-weight:700}
.header p{font-size:.85rem;opacity:.85;margin-top:4px}
.card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.card-title{font-size:1.05rem;font-weight:700;margin-bottom:12px}
/* Login */
.login-box{max-width:360px;margin:60px auto}
.login-box .card{text-align:center}
.login-box input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.92rem;outline:none;margin-bottom:12px}
.login-box input:focus{border-color:var(--primary)}
/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);text-align:center}
.stat-card .num{font-size:1.8rem;font-weight:800;color:var(--primary)}
.stat-card .label{font-size:.8rem;color:var(--text-secondary);margin-top:2px}
.stat-card.green .num{color:var(--success)}
.stat-card.orange .num{color:var(--warning)}
/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;font-size:.82rem;border-collapse:collapse}
th,td{border:1px solid var(--border);padding:8px 10px;text-align:left;vertical-align:top}
th{background:var(--primary-light);font-weight:600;position:sticky;top:0;white-space:nowrap}
td{max-width:200px;word-break:break-word}
tr:nth-child(even){background:#fafbfc}
tr:hover{background:#f1f5f9}
/* Buttons */
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#059669}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:hover{background:#d1d9e6}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.72rem;font-weight:600}
.badge-blue{background:var(--primary-light);color:var(--primary)}
.badge-green{background:#d1fae5;color:#065f46}
.badge-orange{background:#fef3c7;color:#92400e}
/* Toast */
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:12px 24px;border-radius:8px;font-size:.85rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
/* Auth error */
.auth-error{color:var(--danger);font-size:.85rem;margin-bottom:8px;display:none}
/* Loading */
.loading{text-align:center;color:var(--text-secondary);padding:40px}
.loading .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-radius:50%;border-top-color:var(--primary);animation:spin .6s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
/* Filters */
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.filters select,.filters input{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;outline:none;background:#fff}
.filters select:focus,.filters input:focus{border-color:var(--primary)}
@media(max-width:600px){
  .container{padding:12px}
  .header{padding:18px 16px}
  .card{padding:14px}
  th,td{padding:6px 8px;font-size:.76rem}
}
</style>
</head>
<body>

<div class="header">
  <h1>📊 问卷管理后台</h1>
  <p>大学生职业规划倾向调查 · 数据管理</p>
</div>

<div class="container">

<!-- Login -->
<div class="login-box" id="loginBox">
  <div class="card">
    <div style="font-size:2.5rem;margin-bottom:12px">🔐</div>
    <h2 style="font-size:1.1rem;margin-bottom:4px">请输入管理密码</h2>
    <p style="font-size:.82rem;color:var(--text-secondary);margin-bottom:16px">联系管理员获取密码</p>
    <input type="password" id="pwdInput" placeholder="请输入密码" onkeydown="if(event.key==='Enter')login()">
    <div class="auth-error" id="authError">密码错误，请重试</div>
    <button class="btn btn-primary" onclick="login()" style="width:100%;justify-content:center">登录</button>
    <p style="margin-top:12px;font-size:.8rem"><a href="/" style="color:var(--primary)">← 返回问卷</a></p>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="hidden">

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid"></div>

  <!-- Actions -->
  <div class="card">
    <div class="card-title">数据操作</div>
    <div class="btn-group">
      <button class="btn btn-success" onclick="exportCSV()">📥 导出 CSV</button>
      <button class="btn btn-primary" onclick="refreshData()">🔄 刷新数据</button>
      <button class="btn btn-danger" onclick="clearData()">🗑️ 清除所有数据</button>
    </div>
  </div>

  <!-- Data Table -->
  <div class="card">
    <div class="card-title">问卷详情</div>
    <div class="filters">
      <span style="font-size:.85rem;color:var(--text-secondary)">共 <strong id="totalCount">0</strong> 条记录</span>
      <span style="font-size:.85rem;color:var(--text-secondary);margin:0 4px">|</span>
      <select id="filterPath" onchange="renderTable()">
        <option value="">全部去向</option>
        <option value="就业">就业</option>
        <option value="深造">深造</option>
        <option value="未确定">未确定</option>
        <option value="其他">其他</option>
      </select>
      <select id="filterGrade" onchange="renderTable()">
        <option value="">全部年级</option>
        <option value="大一">大一</option>
        <option value="大二上学期">大二上学期</option>
      </select>
    </div>
    <div id="tableContainer"><div class="loading"><div class="spinner"></div><br>加载中...</div></div>
  </div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
const PASSWORD_KEY = 'admin_pwd';
let responseData = [];

function login() {
  const pwd = document.getElementById('pwdInput').value;
  if (!pwd) { showToast('请输入密码'); return; }
  document.getElementById('authError').style.display = 'none';
  fetchData(pwd);
}

function fetchData(pwd) {
  fetch('/api/results?pwd=' + encodeURIComponent(pwd))
    .then(r => {
      if (r.status === 401) {
        document.getElementById('authError').style.display = 'block';
        throw new Error('密码错误');
      }
      return r.json();
    })
    .then(data => {
      if (data.data) {
        localStorage.setItem(PASSWORD_KEY, pwd);
        responseData = data.data;
        document.getElementById('loginBox').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        renderDashboard();
      }
    })
    .catch(e => {
      if (e.message !== '密码错误') {
        showToast('网络错误，请检查连接');
      }
    });
}

function renderDashboard() {
  const total = responseData.length;
  const employment = responseData.filter(r => r.career_path === '就业').length;
  const study = responseData.filter(r => r.career_path === '深造').length;
  const undecided = responseData.filter(r => r.career_path === '未确定').length;
  const other = responseData.filter(r => r.career_path === '其他' || !r.career_path).length;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="label">总问卷数</div></div>
    <div class="stat-card green"><div class="num">${employment}</div><div class="label">倾向就业</div></div>
    <div class="stat-card orange"><div class="num">${study}</div><div class="label">倾向深造</div></div>
    <div class="stat-card"><div class="num">${undecided}</div><div class="label">尚未确定</div></div>
  `;
  document.getElementById('totalCount').textContent = total;
  renderTable();
}

function renderTable() {
  const filterPath = document.getElementById('filterPath').value;
  const filterGrade = document.getElementById('filterGrade').value;

  let filtered = responseData;
  if (filterPath) filtered = filtered.filter(r => r.career_path === filterPath);
  if (filterGrade) filtered = filtered.filter(r => r.grade === filterGrade);

  if (filtered.length === 0) {
    document.getElementById('tableContainer').innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:30px">暂无匹配数据</p>';
    return;
  }

  let html = '<div class="table-wrap"><table><thead><tr>' +
    '<th>#</th><th>时间</th><th>专业</th><th>年级</th><th>性别</th><th>去向</th>' +
    '<th>深造类型</th><th>院校层次</th><th>跨专业</th><th>深造原因</th><th>考研准备</th><th>考研失败</th>' +
    '<th>就业-关联度</th><th>就业-单位</th><th>就业-薪资</th><th>就业-准备</th><th>就业-原因</th>' +
    '<th>困惑原因</th><th>学校支持</th><th>补充意见</th>' +
    '</tr></thead><tbody>';

  filtered.forEach(r => {
    const t = (r.created_at || '').slice(0, 16);
    html += `<tr>
      <td>${r.id}</td>
      <td>${t}</td>
      <td>${esc(r.major)}</td>
      <td>${esc(r.grade)}</td>
      <td>${esc(r.gender)}</td>
      <td><span class="badge ${badgeClass(r.career_path)}">${esc(r.career_path)}</span></td>
      <td>${esc(r.q10)}</td>
      <td>${esc(r.q11)}</td>
      <td>${esc(r.q12)}</td>
      <td>${esc(r.q13)}</td>
      <td>${esc(r.q14)}</td>
      <td>${esc(r.q15)}</td>
      <td>${esc(r.q5)}</td>
      <td>${esc(r.q6)}</td>
      <td>${esc(r.q7)}</td>
      <td>${esc(r.q8)}</td>
      <td>${esc(r.q9)}</td>
      <td>${esc(r.q16)}</td>
      <td>${esc(r.q17)}</td>
      <td>${esc(r.q18)}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  document.getElementById('tableContainer').innerHTML = html;
}

function exportCSV() {
  const pwd = localStorage.getItem(PASSWORD_KEY);
  if (!pwd) { showToast('请先登录'); return; }
  window.location.href = '/api/export/csv?pwd=' + encodeURIComponent(pwd);
}

function refreshData() {
  const pwd = localStorage.getItem(PASSWORD_KEY);
  if (!pwd) { showToast('请先登录'); return; }
  document.getElementById('tableContainer').innerHTML = '<div class="loading"><div class="spinner"></div><br>刷新中...</div>';
  fetchData(pwd);
}

function clearData() {
  if (!confirm('确定要清除所有问卷数据吗？此操作不可恢复！')) return;
  if (!confirm('再次确认：这将删除所有 ${responseData.length} 条记录！')) return;

  // Note: server-side clear is not implemented for safety
  // Admin can use the CSV export to back up data first
  showToast('如需清除数据，请联系服务器管理员操作数据库文件');
}

function esc(v) { return v || ''; }

function badgeClass(path) {
  if (path === '就业') return 'badge-green';
  if (path === '深造') return 'badge-blue';
  if (path === '未确定') return 'badge-orange';
  return '';
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// Auto login with saved password
(function() {
  const saved = localStorage.getItem(PASSWORD_KEY);
  if (saved) {
    document.getElementById('pwdInput').value = saved;
    fetchData(saved);
  }
})();
</script>

</body>
</html>
